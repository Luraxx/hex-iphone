name: iOS Build

# Manual only: keep the workflow maintained, but don't auto-run on every push
# (macOS runners burn the free minutes fast). Trigger from the Actions tab, or
# `gh workflow run build.yml`, whenever a change actually needs verifying.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          ls -d /Applications/Xcode*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: SPM cache
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ hashFiles('project.yml') }}

      - name: Build (Release, unsigned, device)
        run: |
          xcodebuild build \
            -project Hex.xcodeproj \
            -scheme Hex \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R "DerivedData/Build/Products/Release-iphoneos/Hex.app" Payload/
          zip -qry Hex-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Hex-unsigned-ipa
          path: Hex-unsigned.ipa
          retention-days: 30
